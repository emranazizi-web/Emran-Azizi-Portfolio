<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emran Azizi | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #04060d;
    --text: white;
    --card: rgba(255,255,255,0.05);
    --primary: #00f7ff;
    --secondary: #00ff88;
}

.light {
    --bg: #f4f7fb;
    --text: #111;
    --card: white;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.4s;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    text-align: center;
    padding: 12px;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.3);
}

nav a {
    margin: 0 12px;
    color: var(--primary);
    text-decoration: none;
}

/* TOGGLE BUTTON */
.toggle {
    position: fixed;
    right: 20px;
    top: 15px;
    background: var(--primary);
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}

/* HERO */
.hero {
    text-align: center;
    padding: 150px 20px;
}

.hero img {
    width: 140px;
    border-radius: 50%;
    border: 2px solid var(--primary);
}

.hero h1 {
    color: var(--primary);
}

/* BUTTON */
.btn {
    padding: 10px 16px;
    background: var(--primary);
    color: black;
    border-radius: 8px;
    text-decoration: none;
}

/* SECTION */
section {
    max-width: 1000px;
    margin: auto;
    padding: 60px 20px;
}

/* CARD */
.card {
    background: var(--card);
    padding: 20px;
    border-radius: 10px;
    margin: 10px 0;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">🌙</button>

<nav>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero" id="about">
<img src="profile.jpg">
<h1>Emran Azizi</h1>

<p>Software Engineering Student | Berlin</p>

<p style="color: var(--secondary); font-weight: bold;">
Open to Part-Time / Student Job
</p>

<a class="btn" href="cv.pdf" target="_blank">View CV</a>
</div>

<section id="skills">
<h2>Skills</h2>
<div class="card">Python, HTML, CSS, GitHub, AI Tools</div>
</section>

<section id="projects">
<h2>Projects</h2>
<div class="card">Portfolio Website, Student System, To-Do App</div>
</section>

<section id="contact">
<h2>Contact</h2>
<div class="card">
<a href="mailto:emranazizi1002@gmail.com">Email</a><br>
<a href="https://www.linkedin.com/in/emran-azizi-5b2409403" target="_blank">LinkedIn</a><br>
<a href="https://www.instagram.com/shahzada_official_001" target="_blank">Instagram</a>
</div>
</section>

<script>
function toggleMode() {
document.body.classList.toggle("light");
}
</script>

</body>
</html>
